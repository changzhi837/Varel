<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varel</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF6F0;--bg-deep:#F3EDE4;--bg-card:#FFFCF7;--border:rgba(160,140,110,0.15);--border-focus:rgba(160,140,110,0.35);--text:#3D3529;--text-soft:#8A7E6E;--text-muted:#B5AA98;--accent:#C4956A;--accent-glow:rgba(196,149,106,0.2);--green-soft:#A8B89C;--rose-soft:#D4A9A0;--blue-soft:#A0B8C4;--lavender:#B8A9C4}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans SC','PingFang SC',-apple-system,sans-serif}
.app{max-width:640px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--rose-soft));display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--accent)}
.header-right{display:flex;gap:6px;align-items:center}
#langBtn{background:var(--bg-card);border:1px solid var(--border);color:var(--accent);border-radius:10px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500}
.tabs{display:flex;gap:2px;background:var(--bg-deep);border-radius:12px;padding:3px;border:1px solid var(--border)}
.tab{padding:5px 14px;border-radius:10px;font-size:12px;cursor:pointer;color:var(--text-soft);background:none;border:none;font-family:inherit;transition:all 0.2s}
.tab.active{background:var(--bg-card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.panel{display:none;flex:1;flex-direction:column;min-height:0}
.panel.active{display:flex}
.topics{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.topics h2{text-align:center;font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-top:8px}
.topics>p{text-align:center;color:var(--text-soft);font-size:13px;line-height:1.8;font-weight:300;margin-top:2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.15s}
.card:active{transform:scale(0.97)}
.card-bar{position:absolute;top:0;left:0;right:0;height:2.5px}
.card-icon{font-size:20px;margin-bottom:8px}
.card-title{font-size:12.5px;line-height:1.55}
.card-desc{font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.4;font-weight:300}
.learn-chat{flex:1;display:none;flex-direction:column;min-height:0;padding:12px 20px 0}
.learn-chat.active{display:flex}
.back{background:none;border:none;color:var(--text-soft);font-size:12px;cursor:pointer;padding:2px 0 10px;font-family:inherit;text-align:left}
.chat-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-head h3{font-size:14px;color:var(--text-soft);font-weight:400}
.chat-head p{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:300}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:16px 20px 8px}
.msg{display:flex;gap:8px;animation:msgIn 0.3s ease-out}
.msg.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:11px}
.av.ai{background:linear-gradient(135deg,var(--accent),var(--rose-soft));color:#fff;font-size:12px;box-shadow:0 2px 8px var(--accent-glow)}
.av.user{background:var(--bg-deep);border:1px solid var(--border);color:var(--text-soft);font-size:10px}
.bub{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.8;font-weight:300;white-space:pre-wrap}
.msg.ai .bub{background:var(--bg-card);border:1px solid var(--border);border-top-left-radius:4px}
.msg.user .bub{background:linear-gradient(135deg,#E8D5C0,#E2CCAE);border:1px solid rgba(196,149,106,0.2);border-top-right-radius:4px}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0.4;animation:blink 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.3;transform:scale(1)}40%{opacity:1;transform:scale(1.3)}}
.input-area{padding:10px 20px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--bg)}
.input-wrap{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:9px 14px}
.input-wrap:focus-within{border-color:var(--border-focus)}
textarea{width:100%;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;font-weight:300;resize:none;line-height:1.6;max-height:100px;min-height:20px}
textarea::placeholder{color:var(--text-muted)}
.send{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--rose-soft));border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px var(--accent-glow);transition:opacity 0.2s}
.send:disabled{opacity:0.35;cursor:not-allowed}
.note{text-align:center;font-size:11px;color:var(--text-muted);padding:0 20px 6px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(160,140,110,0.15);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">Varel</span>
    </div>
    <div class="header-right">
      <button onclick="toggleLang()" id="langBtn">ID</button>
      <div class="tabs">
        <button class="tab active" id="tabLearn" onclick="showTab('learn')">了解双相</button>
        <button class="tab" id="tabChat" onclick="showTab('chat')">倾诉</button>
      </div>
    </div>
  </header>
  <div class="panel active" id="learnPanel">
    <div class="topics" id="topicList">
      <h2 id="topicTitle">认识你的状态</h2>
      <p id="topicDesc">双相情感障碍有很多面。<br>选一个话题，我们慢慢聊。</p>
      <div class="grid">
        <div class="card" onclick="openTopic('symptoms')">
          <div class="card-bar" style="background:linear-gradient(90deg,var(--accent),var(--blue-soft))"></div>
          <div class="card-icon">🌊</div>
          <div class="card-title" id="card-t1">我的情绪为什么这么极端？</div>
          <div class="card-desc" id="card-d1">了解躁狂与抑郁的表现</div>
        </div>
        <div class="card" onclick="openTopic('relationships')">
          <div class="card-bar" style="background:linear-gradient(90deg,var(--blue-soft),var(--rose-soft))"></div>
          <div class="card-icon">🤝</div>
          <div class="card-title" id="card-t2">为什么我总觉得被抛弃？</div>
          <div class="card-desc" id="card-d2">双相如何影响亲密关系</div>
        </div>
        <div class="card" onclick="openTopic('treatment')">
          <div class="card-bar" style="background:linear-gradient(90deg,var(--green-soft),var(--accent))"></div>
          <div class="card-icon">🌱</div>
          <div class="card-title" id="card-t3">吃药真的有用吗？</div>
          <div class="card-desc" id="card-d3">治疗的过程是什么样的</div>
        </div>
        <div class="card" onclick="openTopic('daily')">
          <div class="card-bar" style="background:linear-gradient(90deg,var(--lavender),var(--rose-soft))"></div>
          <div class="card-icon">☀️</div>
          <div class="card-title" id="card-t4">今天状态不好怎么办？</div>
          <div class="card-desc" id="card-d4">日常小事帮助稳定情绪</div>
        </div>
      </div>
    </div>
    <div class="learn-chat" id="learnChat">
      <button class="back" id="backBtn" onclick="backToTopics()">← 返回话题</button>
      <div class="msgs" id="learnMsgs"></div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="learnInput" placeholder="继续问我..." rows="1" onkeydown="onKey(event,'learn')" oninput="resize(this)"></textarea>
        </div>
        <button class="send" id="learnSend" onclick="sendLearn()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="panel" id="chatPanel">
    <div class="chat-head">
      <h3 id="chatTitle">今天怎么了？</h3>
      <p id="chatDesc">这里没有评判，你可以说任何感受。</p>
    </div>
    <div class="msgs" id="chatMsgs"></div>
    <p class="note" id="noteText">Varel 不是医生，无法替代专业治疗。</p>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="chatInput" placeholder="说说你现在的感受..." rows="1" onkeydown="onKey(event,'chat')" oninput="resize(this)"></textarea>
      </div>
      <button class="send" id="chatSend" onclick="sendChat()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const KEY=['hf_XKLKUGkXbAXUfn','KhmSnkXqhkPEMvU','WmEPM'].join('');
const MODEL='meta-llama/Llama-3.1-8B-Instruct:cerebras';
const SYS_LEARN=(l)=>l==='id'?'Kamu adalah Varel, teman AI yang membantu penderita gangguan bipolar memahami kondisi mereka. Gaya bicara seperti teman yang paham psikologi, bukan buku teks. Kalimat pendek, mudah dipahami. Tidak mendiagnosis atau meresepkan obat. Balas maksimal 150 kata. Hanya gunakan Bahasa Indonesia.':'你是 Varel，帮助双相情感障碍患者了解病情的AI伙伴。风格像懂心理学的朋友，不像教科书。句子短，说人话。不诊断不开处方。每次回复不超过150字。只用中文回复。';
const SYS_CHAT=(l)=>l==='id'?'Kamu adalah Varel, teman AI yang menemani penderita gangguan bipolar. Pendengar yang tenang. Tidak buru-buru memberi saran, pahami perasaan dulu. Kalimat pendek, tidak menggurui. Seperti teman yang menemani di malam hari. Jika mereka menyebut menyakiti diri sendiri, ingatkan dengan lembut untuk hubungi dokter. Balas maksimal 100 kata. Hanya gunakan Bahasa Indonesia.':'你是 Varel，陪伴双相情感障碍患者的AI情绪伙伴。安静的倾听者。不急着给建议，先理解感受。句子短，不说教。像深夜陪着对方的朋友。如果对方提到伤害自己，温和提醒联系医生。每次回复100字以内。只用中文回复。';
const TOPICS={zh:{symptoms:'我想了解双相情感障碍的症状，为什么情绪会这么极端？',relationships:'双相如何影响亲密关系？为什么总觉得被抛弃？',treatment:'吃药治疗双相真的有用吗？需要一直吃吗？',daily:'双相患者日常可以做什么稳定情绪？'},id:{symptoms:'Kenapa emosi bisa seekstrem itu? Apa bedanya dengan mood biasa?',relationships:'Bagaimana bipolar mempengaruhi hubungan? Kenapa sering merasa ditinggalkan?',treatment:'Apakah minum obat benar-benar membantu? Harus selamanya?',daily:'Apa yang bisa dilakukan sehari-hari untuk stabilkan mood?'}};
const UI={zh:{langBtn:'ID',tabLearn:'了解双相',tabChat:'倾诉',topicTitle:'认识你的状态',topicDesc:'双相情感障碍有很多面。<br>选一个话题，我们慢慢聊。',ct:['我的情绪为什么这么极端？','为什么我总觉得被抛弃？','吃药真的有用吗？','今天状态不好怎么办？'],cd:['了解躁狂与抑郁的表现','双相如何影响亲密关系','治疗的过程是什么样的','日常小事帮助稳定情绪'],chatTitle:'今天怎么了？',chatDesc:'这里没有评判，你可以说任何感受。',lPH:'继续问我...',cPH:'说说你现在的感受...',back:'← 返回话题',note:'Varel 不是医生，无法替代专业治疗。',hi:'嗨，我是 Varel。\n\n不管你现在是平静、烦躁、还是说不清楚的感觉——都可以跟我说说。我在听。',u:'你'},id:{langBtn:'中文',tabLearn:'Kenali Bipolar',tabChat:'Curhat',topicTitle:'Kenali Kondisimu',topicDesc:'Gangguan bipolar punya banyak sisi.<br>Pilih topik, kita ngobrol pelan-pelan.',ct:['Kenapa emoiku bisa seekstrem ini?','Kenapa aku selalu merasa ditinggalkan?','Apakah minum obat benar-benar membantu?','Gimana kalau hari ini lagi nggak baik?'],cd:['Kenali gejala manik dan depresi','Bagaimana bipolar mempengaruhi hubungan','Seperti apa proses pengobatannya','Hal kecil yang membantu stabilkan mood'],chatTitle:'Gimana hari ini?',chatDesc:'Nggak ada yang dihakimi, cerita aja.',lPH:'Tanya lagi...',cPH:'Ceritain perasaanmu...',back:'← Kembali ke topik',note:'Varel bukan dokter dan tidak menggantikan penanganan profesional.',hi:'Hai, aku Varel.\n\nApapun yang kamu rasakan sekarang — tenang, gelisah, atau nggak bisa dijelaskan — cerita aja. Aku dengerin.',u:'Aku'}};
let learnH=[],chatH=[],LANG='zh';
function applyLang(){const s=UI[LANG];document.getElementById('langBtn').textContent=s.langBtn;document.getElementById('tabLearn').textContent=s.tabLearn;document.getElementById('tabChat').textContent=s.tabChat;document.getElementById('topicTitle').textContent=s.topicTitle;document.getElementById('topicDesc').innerHTML=s.topicDesc;document.getElementById('chatTitle').textContent=s.chatTitle;document.getElementById('chatDesc').textContent=s.chatDesc;document.getElementById('learnInput').placeholder=s.lPH;document.getElementById('chatInput').placeholder=s.cPH;document.getElementById('backBtn').textContent=s.back;document.getElementById('noteText').textContent=s.note;for(let i=1;i<=4;i++){document.getElementById('card-t'+i).textContent=s.ct[i-1];document.getElementById('card-d'+i).textContent=s.cd[i-1]}}
function toggleLang(){LANG=LANG==='zh'?'id':'zh';applyLang();learnH=[];chatH=[];document.getElementById('learnMsgs').innerHTML='';document.getElementById('chatMsgs').innerHTML='';backToTopics();addMsg('chatMsgs','ai',UI[LANG].hi)}
window.onload=()=>{applyLang();addMsg('chatMsgs','ai',UI[LANG].hi)};
function showTab(t){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='learn')||(i===1&&t==='chat')));document.getElementById('learnPanel').classList.toggle('active',t==='learn');document.getElementById('chatPanel').classList.toggle('active',t==='chat')}
function openTopic(id){learnH=[];document.getElementById('topicList').style.display='none';document.getElementById('learnChat').classList.add('active');document.getElementById('learnMsgs').innerHTML='';learnH.push({role:'user',content:TOPICS[LANG][id]});callAI(SYS_LEARN(LANG),learnH,'learnMsgs','learnSend')}
function backToTopics(){document.getElementById('topicList').style.display='';document.getElementById('learnChat').classList.remove('active')}
function sendLearn(){const el=document.getElementById('learnInput');const t=el.value.trim();if(!t)return;el.value='';resize(el);addMsg('learnMsgs','user',t);learnH.push({role:'user',content:t});callAI(SYS_LEARN(LANG),learnH,'learnMsgs','learnSend')}
function sendChat(){const el=document.getElementById('chatInput');const t=el.value.trim();if(!t)return;el.value='';resize(el);addMsg('chatMsgs','user',t);chatH.push({role:'user',content:t});callAI(SYS_CHAT(LANG),chatH,'chatMsgs','chatSend')}
async function callAI(sys,h,mid,bid){document.getElementById(bid).disabled=true;const tp=addTyping(mid);const fb=LANG==='id'?'Maaf, coba lagi nanti ya?':'稍后再试试？';try{const r=await fetch('https://router.huggingface.co/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({model:MODEL,messages:[{role:'system',content:sys},...h],max_tokens:512})});const d=await r.json();tp.remove();const re=d.choices?.[0]?.message?.content||d.error?.message||fb;addMsg(mid,'ai',re);h.push({role:'assistant',content:re})}catch(e){tp.remove();addMsg(mid,'ai',fb)}document.getElementById(bid).disabled=false}
function addMsg(id,role,text){const c=document.getElementById(id);const d=document.createElement('div');d.className='msg '+role;d.innerHTML='<div class="av '+role+'">'+(role==='ai'?'✦':UI[LANG].u)+'</div><div class="bub">'+text.replace(/\n/g,'<br>')+'</div>';c.appendChild(d);c.scrollTop=c.scrollHeight}
function addTyping(id){const c=document.getElementById(id);const d=document.createElement('div');d.className='msg ai';d.innerHTML='<div class="av ai">✦</div><div class="bub"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';c.appendChild(d);c.scrollTop=c.scrollHeight;return d}
function onKey(e,m){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();m==='learn'?sendLearn():sendChat()}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
</script>
</body>
</html>
