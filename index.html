<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varel · 你的情绪伙伴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0e0e12;color:#e8e6f0;font-family:'Noto Sans SC','PingFang SC',sans-serif}
.app{max-width:640px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7dd3fc);display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 16px rgba(167,139,250,0.3)}
.logo-text{font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;background:linear-gradient(90deg,#a78bfa,#7dd3fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:4px;background:#16161d;border-radius:20px;padding:4px;border:1px solid rgba(255,255,255,0.07)}
.tab{padding:5px 14px;border-radius:14px;font-size:12px;cursor:pointer;color:#7a788a;background:none;border:none;font-family:inherit;transition:all 0.2s}
.tab.active{background:#1e1e28;color:#e8e6f0}
.panel{display:none;flex:1;flex-direction:column;min-height:0}
.panel.active{display:flex}
/* Learn */
.topics{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.topics h2{text-align:center;font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-top:8px}
.topics p{text-align:center;color:#7a788a;font-size:13px;line-height:1.7;font-weight:300;margin-top:6px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.card{background:#16161d;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.15s}
.card:active{transform:scale(0.97)}
.card-bar{position:absolute;top:0;left:0;right:0;height:2px}
.card-icon{font-size:20px;margin-bottom:8px}
.card-title{font-size:12px;line-height:1.5}
.card-desc{font-size:11px;color:#7a788a;margin-top:3px;line-height:1.4;font-weight:300}
.learn-chat{flex:1;display:none;flex-direction:column;min-height:0;padding:12px 20px 0}
.learn-chat.active{display:flex}
.back{background:none;border:none;color:#7a788a;font-size:12px;cursor:pointer;padding:2px 0 10px;font-family:inherit;text-align:left}
/* Chat */
.chat-head{padding:14px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.chat-head h3{font-size:14px;color:#7a788a;font-weight:400}
.chat-head p{font-size:12px;color:#4a4860;margin-top:3px;font-weight:300}
/* Messages */
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:16px 20px 8px}
.msg{display:flex;gap:8px}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:11px}
.av.ai{background:linear-gradient(135deg,#a78bfa,#7dd3fc);font-size:13px;box-shadow:0 0 10px rgba(167,139,250,0.25)}
.av.user{background:#1e1e28;border:1px solid rgba(255,255,255,0.07);color:#7a788a}
.bub{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.75;font-weight:300;white-space:pre-wrap}
.msg.ai .bub{background:#161620;border:1px solid rgba(255,255,255,0.07);border-top-left-radius:4px}
.msg.user .bub{background:#1e1e35;border:1px solid rgba(167,139,250,0.2);border-top-right-radius:4px}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0}
.dot{width:5px;height:5px;border-radius:50%;background:#a78bfa;opacity:0.4;animation:blink 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.3;transform:scale(1)}40%{opacity:1;transform:scale(1.3)}}
/* Input */
.input-area{padding:10px 20px 20px;border-top:1px solid rgba(255,255,255,0.07);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.input-wrap{flex:1;background:#16161d;border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:9px 14px}
.input-wrap:focus-within{border-color:rgba(167,139,250,0.35)}
textarea{width:100%;background:none;border:none;outline:none;color:#e8e6f0;font-family:inherit;font-size:14px;font-weight:300;resize:none;line-height:1.6;max-height:100px;min-height:20px}
textarea::placeholder{color:#4a4860}
.send{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7dd3fc);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(167,139,250,0.25);transition:opacity 0.2s}
.send:disabled{opacity:0.35;cursor:not-allowed}
.note{text-align:center;font-size:11px;color:#4a4860;padding:0 20px 6px;line-height:1.6}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">Varel</span>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('learn')">了解双相</button>
      <button class="tab" onclick="showTab('chat')">倾诉</button>
    </div>
  </header>

  <!-- Learn Panel -->

  <div class="panel active" id="learnPanel">
    <div class="topics" id="topicList">
      <h2>认识你的状态</h2>
      <p>双相情感障碍有很多面。<br>选一个话题，我们慢慢聊。</p>
      <div class="grid">
        <div class="card" onclick="openTopic('symptoms')">
          <div class="card-bar" style="background:linear-gradient(90deg,#a78bfa,#7dd3fc)"></div>
          <div class="card-icon">🌊</div>
          <div class="card-title">我的情绪为什么这么极端？</div>
          <div class="card-desc">了解躁狂与抑郁的表现</div>
        </div>
        <div class="card" onclick="openTopic('relationships')">
          <div class="card-bar" style="background:linear-gradient(90deg,#7dd3fc,#f9a8d4)"></div>
          <div class="card-icon">🤝</div>
          <div class="card-title">为什么我总觉得被抛弃？</div>
          <div class="card-desc">双相如何影响亲密关系</div>
        </div>
        <div class="card" onclick="openTopic('treatment')">
          <div class="card-bar" style="background:linear-gradient(90deg,#f9a8d4,#a78bfa)"></div>
          <div class="card-icon">🌱</div>
          <div class="card-title">吃药真的有用吗？</div>
          <div class="card-desc">治疗的过程是什么样的</div>
        </div>
        <div class="card" onclick="openTopic('daily')">
          <div class="card-bar" style="background:linear-gradient(90deg,#a78bfa,#f9a8d4)"></div>
          <div class="card-icon">☀️</div>
          <div class="card-title">今天状态不好怎么办？</div>
          <div class="card-desc">日常小事帮助稳定情绪</div>
        </div>
      </div>
    </div>
    <div class="learn-chat" id="learnChat">
      <button class="back" onclick="backToTopics()">← 返回话题</button>
      <div class="msgs" id="learnMsgs"></div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="learnInput" placeholder="继续问我..." rows="1"
            onkeydown="onKey(event,'learn')" oninput="resize(this)"></textarea>
        </div>
        <button class="send" id="learnSend" onclick="sendLearn()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Chat Panel -->

  <div class="panel" id="chatPanel">
    <div class="chat-head">
      <h3>今天怎么了？</h3>
      <p>这里没有评判，你可以说任何感受。</p>
    </div>
    <div class="msgs" id="chatMsgs"></div>
    <p class="note">Varel 不是医生，无法替代专业治疗。</p>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="chatInput" placeholder="说说你现在的感受..." rows="1"
          onkeydown="onKey(event,'chat')" oninput="resize(this)"></textarea>
      </div>
      <button class="send" id="chatSend" onclick="sendChat()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const KEY = ['hf_XKLKUGkXbAXUfn', 'KhmSnkXqhkPEMvU', 'WmEPM'].join('');
const MODEL = 'Qwen/Qwen2.5-72B-Instruct';

const SYS_LEARN = '你是 Varel，帮助双相情感障碍患者了解病情的AI伙伴。风格像懂心理学的朋友，不像教科书。句子短，说人话。不诊断不开处方。每次回复不超过150字。只用中文回复。';
const SYS_CHAT = '你是 Varel，陪伴双相情感障碍患者的AI情绪伙伴。安静的倾听者。不急着给建议，先理解感受。句子短，不说教。像深夜陪着对方的朋友。如果对方提到伤害自己，温和提醒联系医生。每次回复100字以内。只用中文回复。';

const TOPICS = {
  symptoms: '我想了解双相情感障碍的症状，为什么情绪会这么极端？和普通情绪波动有什么区别？',
  relationships: '双相如何影响亲密关系？为什么患者总觉得被抛弃，或者觉得对方在指责自己？',
  treatment: '吃药治疗双相真的有用吗？需要多久才能好一点？需要一直吃吗？',
  daily: '双相患者日常可以做什么稳定情绪？有什么真的有用的小事？',
};

let learnH = [], chatH = [];

window.onload = () => {
  addMsg('chatMsgs', 'ai', '嗨，我是 Varel。\n\n不管你现在是平静、烦躁、还是说不清楚的感觉——都可以跟我说说。我在听。');
};

function showTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='learn')||(i===1&&t==='chat')));
  document.getElementById('learnPanel').classList.toggle('active', t==='learn');
  document.getElementById('chatPanel').classList.toggle('active', t==='chat');
}

function openTopic(id) {
  learnH = [];
  document.getElementById('topicList').style.display = 'none';
  document.getElementById('learnChat').classList.add('active');
  document.getElementById('learnMsgs').innerHTML = '';
  const prompt = TOPICS[id];
  learnH.push({role:'user', content: prompt});
  callAI(SYS_LEARN, learnH, 'learnMsgs', 'learnSend');
}

function backToTopics() {
  document.getElementById('topicList').style.display = '';
  document.getElementById('learnChat').classList.remove('active');
}

function sendLearn() {
  const el = document.getElementById('learnInput');
  const t = el.value.trim();
  if (!t) return;
  el.value = ''; resize(el);
  addMsg('learnMsgs', 'user', t);
  learnH.push({role:'user', content:t});
  callAI(SYS_LEARN, learnH, 'learnMsgs', 'learnSend');
}

function sendChat() {
  const el = document.getElementById('chatInput');
  const t = el.value.trim();
  if (!t) return;
  el.value = ''; resize(el);
  addMsg('chatMsgs', 'user', t);
  chatH.push({role:'user', content:t});
  callAI(SYS_CHAT, chatH, 'chatMsgs', 'chatSend');
}

async function callAI(sys, history, msgsId, btnId) {
  document.getElementById(btnId).disabled = true;
  const typing = addTyping(msgsId);
  try {
    const messages = [{role:'system', content:sys}, ...history];
    const res = await fetch('https://router.huggingface.co/novita/v3/openai/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + KEY,
      },
      body: JSON.stringify({model: MODEL, messages, max_tokens: 512})
    });
    const data = await res.json();
    typing.remove();
    console.log('API response:', JSON.stringify(data)); const reply = data.choices?.[0]?.message?.content || data.error?.message || '我现在有点接收不到，稍后再试试？';
    addMsg(msgsId, 'ai', reply);
    history.push({role:'assistant', content:reply});
  } catch(e) {
    typing.remove();
    console.error('API error:', e); addMsg(msgsId, 'ai', '错误: ' + e.message);
  }
  document.getElementById(btnId).disabled = false;
}

function addMsg(id, role, text) {
  const c = document.getElementById(id);
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `<div class="av ${role}">${role==='ai'?'✦':'你'}</div><div class="bub">${text.replace(/\n/g,'<br>')}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addTyping(id) {
  const c = document.getElementById(id);
  const d = document.createElement('div');
  d.className = 'msg ai';
  d.innerHTML = '<div class="av ai">✦</div><div class="bub"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  return d;
}

function onKey(e, mode) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); mode==='learn'?sendLearn():sendChat(); }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>

</body>
</html>
