symptoms: ‘双相的情绪波动和普通心情不一样。\n\n躁狂的时候，你可能觉得自己无所不能，精力爆棚，不需要睡觉，花钱大手大脚，说话特别快。\n\n抑郁的时候，又像掉进了黑洞，什么都不想做，觉得活着没意思。\n\n普通的情绪波动通常有原因，持续时间短。双相的发作可以持续几天甚至几周，而且严重影响日常生活。\n\n如果你发现自己的情绪像坐过山车一样剧烈，建议和专业医生聊聊。’,

let learnH=[],chatH=[],LANG=‘zh’,currentTopic=’’;

function applyLang(){const s=UI[LANG];document.getElementById(‘langBtn’).textContent=s.langBtn;document.getElementById(‘tabLearn’).textContent=s.tabLearn;document.getElementById(‘tabChat’).textContent=s.tabChat;document.getElementById(‘topicTitle’).textContent=s.topicTitle;document.getElementById(‘topicDesc’).innerHTML=s.topicDesc;document.getElementById(‘chatTitle’).textContent=s.chatTitle;document.getElementById(‘chatDesc’).textContent=s.chatDescText;document.getElementById(‘learnInput’).placeholder=s.learnPlaceholder;document.getElementById(‘chatInput’).placeholder=s.chatPlaceholder;document.getElementById(‘backBtn’).textContent=s.backBtn;document.getElementById(‘noteText’).textContent=s.noteText;for(let i=1;i<=4;i++){document.getElementById(‘card-t’+i).textContent=s.cardTitles[i-1];document.getElementById(‘card-d’+i).textContent=s.cardDescs[i-1]}}

function toggleLang(){LANG=LANG===‘zh’?‘id’:‘zh’;applyLang();learnH=[];chatH=[];document.getElementById(‘learnMsgs’).innerHTML=’’;document.getElementById(‘chatMsgs’).innerHTML=’’;backToTopics();addMsg(‘chatMsgs’,‘ai’,UI[LANG].welcome)}

window.onload=()=>{applyLang();addMsg(‘chatMsgs’,‘ai’,UI[LANG].welcome)};

function showTab(t){document.querySelectorAll(’.tab’).forEach((b,i)=>b.classList.toggle(‘active’,(i===0&&t===‘learn’)||(i===1&&t===‘chat’)));document.getElementById(‘learnPanel’).classList.toggle(‘active’,t===‘learn’);document.getElementById(‘chatPanel’).classList.toggle(‘active’,t===‘chat’)}

function openTopic(id){learnH=[];currentTopic=id;document.getElementById(‘topicList’).style.display=‘none’;document.getElementById(‘learnChat’).classList.add(‘active’);document.getElementById(‘learnMsgs’).innerHTML=’’;const prompt=TOPICS[LANG][id];learnH.push({role:‘user’,content:prompt});callAI(SYS_LEARN(LANG),learnH,‘learnMsgs’,‘learnSend’,id)}

function backToTopics(){document.getElementById(‘topicList’).style.display=’’;document.getElementById(‘learnChat’).classList.remove(‘active’)}

function sendLearn(){const el=document.getElementById(‘learnInput’);const t=el.value.trim();if(!t)return;el.value=’’;resize(el);addMsg(‘learnMsgs’,‘user’,t);learnH.push({role:‘user’,content:t});callAI(SYS_LEARN(LANG),learnH,‘learnMsgs’,‘learnSend’,null)}

function sendChat(){const el=document.getElementById(‘chatInput’);const t=el.value.trim();if(!t)return;el.value=’’;resize(el);addMsg(‘chatMsgs’,‘user’,t);chatH.push({role:‘user’,content:t});callAI(SYS_CHAT(LANG),chatH,‘chatMsgs’,‘chatSend’,null)}

async function callAI(sys,history,msgsId,btnId,topicId){
document.getElementById(btnId).disabled=true;
const typing=addTyping(msgsId);
const fallbackText=LANG===‘id’?‘Maaf, aku lagi gangguan. Coba lagi nanti ya?’:‘我现在有点接收不到，稍后再试试？’;

if(USE_MOCK){
// 模拟延迟，让体验更真实
await new Promise(r=>setTimeout(r,800+Math.random()*600));
typing.remove();
let reply;
if(topicId && MOCK[LANG][topicId]){
reply=MOCK[LANG][topicId];
} else {
reply=MOCK[LANG].fallback;
}
addMsg(msgsId,‘ai’,reply);
history.push({role:‘assistant’,content:reply});
document.getElementById(btnId).disabled=false;
return;
}

// 真实 API 调用（部署到 Vercel 时用）
try{
const messages=[{role:‘system’,content:sys},…history];
const res=await fetch(‘https://router.huggingface.co/v1/chat/completions’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’,‘Authorization’:‘Bearer ‘+KEY},
body:JSON.stringify({model:MODEL,messages,max_tokens:512})
});
const data=await res.json();
typing.remove();
const reply=data.choices?.[0]?.message?.content||data.error?.message||fallbackText;
addMsg(msgsId,‘ai’,reply);
history.push({role:‘assistant’,content:reply});
}catch(e){
typing.remove();
addMsg(msgsId,‘ai’,fallbackText+’\n(’+e.message+’)’);
}
document.getElementById(btnId).disabled=false;
}

function addMsg(id,role,text){const c=document.getElementById(id);const d=document.createElement(‘div’);d.className=’msg ’+role;const avLabel=role===‘ai’?‘✦’:UI[LANG].userAvatar;d.innerHTML=`<div class="av ${role}">${avLabel}</div><div class="bub">${text.replace(/\n/g,'<br>')}</div>`;c.appendChild(d);c.scrollTop=c.scrollHeight}

function addTyping(id){const c=document.getElementById(id);const d=document.createElement(‘div’);d.className=‘msg ai’;d.innerHTML=’<div class="av ai">✦</div><div class="bub"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>’;c.appendChild(d);c.scrollTop=c.scrollHeight;return d}

function onKey(e,mode){if(e.key===‘Enter’&&!e.shiftKey){e.preventDefault();mode===‘learn’?sendLearn():sendChat()}}
function resize(el){el.style.height=‘auto’;el.style.height=Math.min(el.scrollHeight,100)+‘px’}
</script>

</body>
</html>
