<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varel</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<header><div class="logo"><i>✦</i><span>Varel</span></div><div class="hdr"><button onclick="toggleLang()" id="langB">ID</button><div class="tabs"><button class="tab on" data-t="home" onclick="showTab('home')">🌱</button><button class="tab" data-t="learn" id="tabL" onclick="showTab('learn')">了解</button></div></div></header>
<div class="pnl on" id="pHome"><div class="home">
<div class="greet" id="greet"></div>
<div class="dq" id="quote"></div>
<div class="pa" id="plantArea"><div class="stem" id="stemEl"></div><div class="pot"></div></div>
<div class="gprog" id="progEl"></div><p class="gstr" id="strEl"></p>
<div id="moodSec" class="sec"></div>
<div class="chart-box"><canvas id="moodCurveC"></canvas></div>
<div id="moodTrend"></div>
<div class="chart-box"><canvas id="sleepCurveC"></canvas></div>
<div id="sleepTrend"></div>
<div id="diarySec" class="sec"></div>
<div id="sleepSec" class="sec"></div>
<div id="medSec" class="sec"></div>
<div class="fla" id="flArea"></div>
<p class="note" id="noteT"></p>
</div></div>
<div class="pnl" id="pLearn">
<div class="learn-scroll" id="lList"><h2 id="lTitle"></h2><p class="sub" id="lDesc"></p><div class="lgrid" id="lGrid"></div></div>
<div class="artv" id="artV"><button class="bkb" id="artBk" onclick="backL()"></button><div class="artscr" id="artC"></div></div>
</div>
</div>
<script src="app.js"></script>
</body>
</html>
