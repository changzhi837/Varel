<style>
:root{--bg:#FAF6F0;--bg2:#F3EDE4;--card:#FFFCF7;--bd:rgba(160,140,110,.15);--bf:rgba(160,140,110,.35);--tx:#3D3529;--ts:#8A7E6E;--tm:#B5AA98;--ac:#C4956A;--ag:rgba(196,149,106,.2);--rs:#D4A9A0;--bs:#A0B8C4;--gn:#7EB07A;--rd:#D4736A;--gs:#A8B89C;--lv:#B8A9C4}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Noto Sans SC','PingFang SC',-apple-system,sans-serif}
.app{max-width:640px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:6px}
.logo i{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--rs));display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-style:normal;box-shadow:0 2px 10px var(--ag)}
.logo span{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--ac)}
.hdr{display:flex;gap:5px;align-items:center}
#langB{background:var(--card);border:1px solid var(--bd);color:var(--ac);border-radius:10px;padding:4px 9px;font-size:10px;cursor:pointer;font-family:inherit}
.tabs{display:flex;gap:1px;background:var(--bg2);border-radius:11px;padding:3px;border:1px solid var(--bd)}
.tab{padding:4px 12px;border-radius:9px;font-size:11px;cursor:pointer;color:var(--ts);background:none;border:none;font-family:inherit;transition:all .2s;white-space:nowrap}
.tab.on{background:var(--card);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.pnl{display:none;flex:1;flex-direction:column;min-height:0}.pnl.on{display:flex}
.home{flex:1;overflow-y:auto;padding:12px 16px 24px;display:flex;flex-direction:column;align-items:center;gap:10px}
.greet{text-align:center;font-size:14px;color:var(--ts);font-weight:300;line-height:1.7;margin-top:2px}
.dq{text-align:center;font-size:12px;color:var(--ac);font-weight:300;font-style:italic;line-height:1.6;padding:8px 12px;background:var(--card);border:1px solid var(--bd);border-radius:12px;width:100%}
.pa{width:180px;height:150px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;margin:2px 0}
.pot{width:56px;height:36px;background:linear-gradient(180deg,#C4956A,#A07550);border-radius:0 0 12px 12px;position:relative;z-index:2}
.pot::before{content:'';position:absolute;top:-5px;left:-5px;right:-5px;height:10px;background:#C4956A;border-radius:3px}
.stem{width:4px;background:var(--gn);position:absolute;bottom:36px;left:50%;transform:translateX(-50%);border-radius:2px;transition:height .5s;z-index:1}
.leaf{position:absolute;width:18px;height:10px;background:var(--gn);border-radius:50%;z-index:1}
.flwr{position:absolute;font-size:22px;z-index:3}
.drp{position:absolute;width:5px;height:7px;background:var(--bs);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;opacity:0;animation:fall .6s ease-in forwards}
@keyframes fall{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(35px)}}
.gprog{display:flex;gap:3px}.gdot{width:11px;height:11px;border-radius:50%;border:1px solid var(--bd);background:var(--bg2)}.gdot.on{background:var(--gn);border-color:var(--gn)}
.gstr{font-size:10px;color:var(--ts)}
.sec{width:100%;background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px}
.sec h3{font-size:13px;color:var(--ts);font-weight:400;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bg{font-size:9px;color:#fff;border-radius:8px;padding:2px 6px;font-weight:500}.bg.y{background:var(--gn)}.bg.n{background:var(--tm)}
.mrow{display:flex;justify-content:center;gap:7px}
.mbtn{width:40px;height:40px;border-radius:50%;border:2px solid var(--bd);background:var(--card);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mbtn:active{transform:scale(.9)}
.tmoods{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;justify-content:center}
.tmoods span{font-size:11px;background:var(--bg2);border-radius:10px;padding:2px 8px}
.chart-box{width:100%;height:110px;position:relative;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:8px}
.chart-box canvas{width:100%;height:100%}
.trend-msg{font-size:11px;padding:6px 10px;border-radius:10px;text-align:center;margin-top:2px;line-height:1.6}
.trend-msg.good{background:rgba(126,176,122,.1);color:var(--gn)}
.trend-msg.bad{background:rgba(212,115,106,.1);color:var(--rd)}
.trend-msg.neutral{background:var(--bg2);color:var(--ts)}
.privacy{font-size:10px;color:var(--tm);margin-bottom:10px;display:flex;align-items:flex-start;gap:4px;line-height:1.5}
.sym-label{font-size:12px;color:var(--ts);margin-bottom:5px}
.sym-checks{display:flex;flex-wrap:wrap;gap:5px}
.sym-chip{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:5px 11px;font-size:11px;color:var(--ts);cursor:pointer;transition:all .15s;font-family:inherit}
.sym-chip:active{transform:scale(.95)}
.sym-chip.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.scale-dots{display:flex;gap:3px;margin-top:4px}
.sdot{width:21px;height:21px;border-radius:50%;border:1px solid var(--bd);background:var(--bg2);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tm)}
.sdot:active{transform:scale(.9)}
.sdot.on{background:var(--ac);border-color:var(--ac);color:#fff}
.sdot.hi{background:var(--rd);border-color:var(--rd);color:#fff}
.dur-row{display:flex;gap:6px;margin-top:6px;align-items:center}
.dur-row select{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:4px 8px;font-family:inherit;font-size:11px;color:var(--tx);outline:none}
.dtxt textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:12px;color:var(--tx);resize:none;outline:none;min-height:40px;margin-top:8px}
.dtxt textarea::placeholder{color:var(--tm)}
.dsave{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:8px 20px;font-family:inherit;font-size:12px;cursor:pointer;margin:8px auto 0;display:block}
.dview .entry{font-size:12px;color:var(--ts);line-height:1.8;white-space:pre-wrap}
.dview .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.dview .tags span{font-size:10px;background:var(--bg2);border-radius:8px;padding:2px 8px;color:var(--ts)}
.dview .ok{font-size:11px;color:var(--gn);margin-top:4px}
.dedit{font-size:11px;color:var(--ac);cursor:pointer;margin-top:4px;background:none;border:none;font-family:inherit}
.sl-row{display:flex;gap:8px;align-items:center;justify-content:center}
.sl-pick{display:flex;flex-direction:column;align-items:center;gap:2px}
.sl-pick label{font-size:10px;color:var(--tm)}
.sl-pick select{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:5px 8px;font-family:inherit;font-size:13px;color:var(--tx);outline:none;min-width:68px}
.sl-big{font-family:'Playfair Display',serif;font-size:22px;color:var(--ac);text-align:center;margin-top:4px}
.sl-unit{font-size:11px;color:var(--ts)}
.sl-warn{font-size:11px;color:var(--rd);margin-top:4px;text-align:center}
.sl-save{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:7px 18px;font-family:inherit;font-size:12px;cursor:pointer;margin:6px auto 0;display:block}
.mi{display:flex;align-items:center;gap:8px;padding:6px 0}.mi+.mi{border-top:1px solid var(--bd)}
.mi-n{flex:1;font-size:13px}.mi-c{display:flex;align-items:center;gap:5px}
.mi-b{width:25px;height:25px;border-radius:50%;border:1px solid var(--bd);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ts);font-family:inherit}
.mi-b:active{transform:scale(.9)}
.mi-v{font-size:13px;font-weight:500;min-width:34px;text-align:center}.mi-v.over{color:var(--rd)}
.mi-d{background:none;border:none;color:var(--tm);cursor:pointer;font-size:14px}
.mi-w{background:rgba(212,115,106,.1);border:1px solid rgba(212,115,106,.3);border-radius:10px;padding:7px;font-size:11px;color:var(--rd);text-align:center;margin-top:4px}
.madd{display:flex;gap:5px;margin-top:8px}

.madd input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.madd button{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:inherit}
.fla{width:100%}.fla p{font-size:11px;color:var(--ts);margin-bottom:4px}.fls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}.fls span{font-size:20px}
.learn-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.learn-scroll h2{text-align:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:400;margin-top:4px}
.learn-scroll>p.sub{text-align:center;color:var(--ts);font-size:12px;font-weight:300}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:2px}
.lcrd{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px 11px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s}
.lcrd:active{transform:scale(.97)}
.lcrd .bar{position:absolute;top:0;left:0;right:0;height:2.5px}
.lcrd .icon{font-size:17px;margin-bottom:5px}.lcrd .tit{font-size:11px;line-height:1.5}.lcrd .dsc{font-size:10px;color:var(--tm);margin-top:2px;font-weight:300}
.artv{display:none;flex:1;flex-direction:column;min-height:0}.artv.on{display:flex}
.artscr{flex:1;overflow-y:auto;padding:16px}
.artscr h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;margin-bottom:10px}
.artscr p{font-size:13px;line-height:2;font-weight:300;margin-bottom:8px}
.artscr .hl{background:var(--bg2);border-left:3px solid var(--ac);padding:8px 12px;border-radius:0 10px 10px 0;margin:8px 0;font-size:12px;line-height:1.8}
.bkb{background:none;border:none;color:var(--ts);font-size:11px;cursor:pointer;padding:8px 16px 4px;font-family:inherit;text-align:left;flex-shrink:0}
.note{text-align:center;font-size:9px;color:var(--tm);padding:6px 16px 2px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(160,140,110,.15);border-radius:2px}
</style>
</head>

function renderSl(){var log=gSl(),ts=log[td()],s=UI[LANG],sec=E(‘sleepSec’);var h=’<h3>’+s.st+’ <span class="bg '+(ts?'y':'n')+'">’+(ts?‘✓’:’’)+’</span></h3>’;if(ts){h+=’<div style="text-align:center"><span class="sl-big">🌙 ‘+ts.hrs.toFixed(1)+’</span> <span class="sl-unit">’+s.sh+’</span></div>’;if(ts.hrs<6)h+=’<div class="sl-warn">’+s.swL+’</div>’;if(ts.hrs>10)h+=’<div class="sl-warn">’+s.swH+’</div>’;}else{h+=’<div class="sl-row"><div class="sl-pick"><label>’+s.sb+’</label><select id="slB" onchange="calcS()">’;for(var i=20;i<=30;i++){var v=i%24;h+=’<option value=”’+i+’”’+(i===23?’ selected’:’’)+’>’+v.toString().padStart(2,‘0’)+’:00</option>’;}h+=’</select></div><div class="sl-pick"><label>’+s.sw+’</label><select id="slW" onchange="calcS()">’;for(var j=4;j<=12;j++){h+=’<option value=”’+j+’”’+(j===7?’ selected’:’’)+’>’+j.toString().padStart(2,‘0’)+’:00</option>’;}h+=’</select></div></div><div style="text-align:center;margin-top:4px"><span class="sl-big" id="slH">8.0</span> <span class="sl-unit">’+s.sh+’</span></div><button class="sl-save" onclick="saveS()">’+s.ss+’</button>’;}sec.innerHTML=h;}
function calcS(){var b=parseInt(E(‘slB’).value),w=parseInt(E(‘slW’).value),hrs=w-(b%24);if(hrs<=0)hrs+=24;var el=E(‘slH’);if(el)el.textContent=hrs.toFixed(1);}
function saveS(){var b=parseInt(E(‘slB’).value),w=parseInt(E(‘slW’).value),hrs=w-(b%24);if(hrs<=0)hrs+=24;var log=gSl();log[td()]={b:b,w:w,hrs:hrs};LS(‘sl’,log);addW();renderSl();drawSC();}

/* Meds */
function gMe(){return LS(‘me’)||[];}
function gML(){return LS(‘ml’)||{};}
function renderMe(){var meds=gMe(),log=gML(),tl=log[td()]||{},s=UI[LANG],sec=E(‘medSec’);var allD=meds.length>0&&meds.every(function(m){return(tl[m.id]||0)>=m.dose;});var h=’<h3>’+s.mt+’ <span class="bg '+(allD?'y':'n')+'">’+(allD?‘✓’:’’)+’</span></h3>’;var ov=false;meds.forEach(function(m){var tk=tl[m.id]||0,o=tk>m.dose;if(o)ov=true;h+=’<div class="mi"><span class="mi-n">’+m.name+’</span><div class="mi-c"><button class="mi-b" onclick="mMi('+m.id+')">−</button><span class="mi-v'+(o?' over':'')+'">’+tk+’/’+m.dose+’</span><button class="mi-b" onclick="mPl('+m.id+')">+</button></div><button class="mi-d" onclick="mDl('+m.id+')">×</button></div>’;});if(ov)h+=’<div class="mi-w">’+s.ow+’</div>’;h+=’<div class="madd"><input type="text" id="mNI" placeholder="'+s.mp+'" maxlength="20"><input type="number" id="mDI" placeholder="'+s.md+'" min="1" max="20" value="1"><button onclick="mAd()">’+s.ma+’</button></div>’;sec.innerHTML=h;}
function mAd(){var n=E(‘mNI’).value.trim(),d=parseInt(E(‘mDI’).value)||1;if(!n)return;var m=gMe();m.push({id:Date.now(),name:n,dose:d});LS(‘me’,m);renderMe();}
function mDl(id){LS(‘me’,gMe().filter(function(m){return m.id!==id;}));renderMe();}
function mPl(id){var log=gML(),k=td();if(!log[k])log[k]={};var meds=gMe(),prev=log[k][id]||0;log[k][id]=prev+1;LS(‘ml’,log);var aN=meds.every(function(m){return(log[k][m.id]||0)>=m.dose;});var aB=meds.every(function(m){var p=m.id===id?prev:(log[k][m.id]||0);return p>=m.dose;});if(aN&&!aB)addW();renderMe();}
function mMi(id){var log=gML(),k=td();if(!log[k])log[k]={};if((log[k][id]||0)>0)log[k][id]–;LS(‘ml’,log);renderMe();}

function renderAll(){E(‘greet’).textContent=getGr();LS(‘lv’,td());E(‘quote’).textContent=’「 ‘+getQ()+’ 」’;renderG();renderMo();renderDi();renderSl();renderMe();}
window.onload=function(){applyLang();renderAll();};
